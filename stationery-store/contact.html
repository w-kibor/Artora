<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artora | Contact</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/cart.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a href="index.html" class="brand" aria-label="Artora home">
          <span class="brand-mark" aria-hidden="true"></span>
          Artora
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
          <li>
            <a href="cart.html">Cart <span class="cart-pill" data-cart-count>0</span></a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="section" aria-labelledby="contact-title">
        <h1 class="section-title" id="contact-title">Contact Us</h1>
        <p class="section-subtitle">Send your cart request and any extra questions in one message.</p>
      </section>

      <section class="section form-shell page-animate">
        <form data-contact-form data-contact-whatsapp="254708921077">
          <label>
            Name
            <input class="input" type="text" name="name" required />
          </label>

          <label>
            Email
            <input class="input" type="email" name="email" required />
          </label>

          <label>
            Message
            <textarea class="textarea" name="message" required></textarea>
          </label>

          <button class="btn btn-primary" type="submit">Send Inquiry</button>
          <p class="notice" data-form-notice hidden>Thanks for reaching out. We will reply soon!</p>
        </form>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-shell">
        <p>© 2026 Artora. Crafted with color and care.</p>
        <div class="social" aria-label="Social media links">
          <a href="#" aria-label="Instagram">Instagram</a>
          <a href="#" aria-label="Pinterest">Pinterest</a>
          <a href="#" aria-label="YouTube">YouTube</a>
        </div>
      </div>
    </footer>
  </body>
</html>
