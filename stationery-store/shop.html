<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorNest Stationery | Shop</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/cart.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a href="index.html" class="brand" aria-label="ColorNest Stationery home">
          <span class="brand-mark" aria-hidden="true"></span>
          ColorNest Stationery
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html" class="active">Shop</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li>
            <a href="cart.html">Cart <span class="cart-pill" data-cart-count>0</span></a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="section" aria-labelledby="shop-title">
        <h1 class="section-title" id="shop-title">Shop Creative Supplies</h1>
        <p class="section-subtitle">Filter by category to find your perfect companion tools.</p>
      </section>

      <section class="section" aria-label="Product filters">
        <div class="filter-row" data-filter-row>
          <button class="filter-btn active" data-filter="All">All</button>
          <button class="filter-btn" data-filter="Coloring Books">Coloring Books</button>
          <button class="filter-btn" data-filter="Journals">Journals</button>
          <button class="filter-btn" data-filter="Pens &amp; Pencils">Pens &amp; Pencils</button>
          <button class="filter-btn" data-filter="Art Supplies">Art Supplies</button>
        </div>
        <div class="grid product-grid" data-shop-grid></div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-shell">
        <p>© 2026 ColorNest Stationery. Crafted with color and care.</p>
        <div class="social" aria-label="Social media links">
          <a href="#" aria-label="Instagram">Instagram</a>
          <a href="#" aria-label="Pinterest">Pinterest</a>
          <a href="#" aria-label="YouTube">YouTube</a>
        </div>
      </div>
    </footer>
  </body>
</html>
